name: Publish Python API Clients

on:
  push:
    branches:
      - main
    paths:
      - 'rest/**'
      - 'scripts/generate_python_clients.py'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv tool install openapi-python-client

      - name: Generate Python Clients
        run: uv run python scripts/generate_python_clients.py

      - name: Build distributions
        run: |
          for client_dir in rest-gen-py/*/; do
            if [ -d "$client_dir" ]; then
              echo "==> Building $(basename $client_dir)"
              cd "$client_dir"
              uv build
              cd - > /dev/null
            fi
          done

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="python-clients-${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_TITLE="Python API Clients ${SHORT_SHA}"
          ASSETS=(rest-gen-py/*/dist/*)

          if [ ! -e "${ASSETS[0]}" ]; then
            echo "No Python client distributions found."
            exit 1
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "Generated Python API client distributions for ${GITHUB_SHA}."
          fi

          gh release upload "$TAG" "${ASSETS[@]}" --clobber
